<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Pagina utilizando forms</title>
    <meta name="stylesheet" href="exercicio2.css">
</head>

<body>
    <main>
        <div id="formulario">
            <form action="">
                <section>
                    <fieldset>
                        <legend>Informações pessoais do aluno</legend>
                        <label for="nome">Nome</label>
                        <input type="text" id="nome" name="name" required size="30" maxlength="50"
                            pattern="[a-zA-Z ]{1,50}" autofocus />
                        <br>
                        <br>
                        <label for="email">E-mail</label>
                        <input type="email" id="email" name="email">
                        <br>
                        <br>
                        <label>Sexo</label>
                        <br>
                        <input type="radio" id="masculino" name="sexo" value="M" checked>
                        <label>Masculino</label>
                        <input type="radio" id="feminino" name="sexo" value="F">
                        <label>Feminino</label>
                        <br>
                        <br>
                        <label>Passatempo:</label>
                        <br>
                        <input type="checkbox" id="passatempo" name="ler">
                        <label>ler</label>
                        <input type="checkbox" id="passatempo2" name="jogar">
                        <label>Jogar vídeo games</label>
                        <input type="checkbox" id="passatempo3" name="esporte">
                        <label>Praticar esportes</label>
                        <input type="checkbox" id="passatempo4" name="cozinhar">
                        <label>Praticar gastronomia</label>
                        <p>
                            <label>Cor Favorita</label>
                            <input type="color" id="cor" name="cor" value="#ff0000">
                        </p>
                        <br>
                        <br>
                        <input type="submit" value="Enviar">
                        <button type="reset">Limpar</button>
                    </fieldset>
                    <br>
                    <br>
                    <fieldset>
                        <legend>Deixe aqui uma informação que julgar necessária</legend>
                        <label>Mensagem</label>
                        <textarea name="mensagem" id="mensagem" cols="50" rows="5"
                            placeholder="Escreva aqui"></textarea>
                        <br>
                        <br>
                        <label>País</label>
                        <select name="pais" id="pais">
                            <option value="">Selecione</option>
                            <option value="brasil">Brasil</option>
                            <option value="eua">EUA</option>
                            <option value="portugal">Portugal</option>
                            <option value="espanha">Espanha</option>
                        </select>
                        <br>
                        <br>
                        <button type="button">Cancelar</button>
                    </fieldset>
                </section>
            </form>
        </div>

    </main>


    <footer class="rodape">Página criada na aula de PWEB
        - Direitos reservados - 2026

    </footer>
</body>

</html>
