<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="Exercicio 9" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 9</title>
    <style>
    </style>
    <script>
        var peso = prompt("Digite o peso:");
        var altura = prompt("Digite a altura:");

        peso = parseFloat(peso);
        altura = parseFloat(altura);

        var IMC = peso / (altura * altura);

        if (IMC < 18.5) {
            alert(IMC + " Magreza");
        } else if (IMC >= 18.5 && IMC <= 24.9) {
            alert(IMC + " Normal");
        } else if (IMC >= 25 && IMC <= 29.9) {
            alert(IMC + " Sobrepeso, Obesidade de grau 1");
        } else if (IMC >= 30 && IMC <= 39.9) {
            alert(IMC + " Obeso, Obesidade de grau 2");
        } else {
            alert(IMC + " Obesidade grave, Obesidade de grau 3");
        }
    </script>
</head>

</html>
